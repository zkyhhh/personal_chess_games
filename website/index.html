<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AI Tutorial Hub</title>
  <meta name="description" content="一个可查找不同 AI 版本、开发者与功能的入门教程网站。" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="hero">
    <div class="hero-inner">
      <p class="eyebrow">入门教程 · 可搜索数据库</p>
      <h1>AI Tutorial Hub</h1>
      <p class="subtitle">快速查找不同 AI 版本、开发者与功能。适合入门学习与对比。</p>
      <div class="search-bar">
        <input id="searchInput" type="search" placeholder="搜索：模型/开发者/功能…" autocomplete="off" />
        <button id="clearBtn" type="button">清除</button>
      </div>
      <div class="filters">
        <button class="filter active" data-filter="all">全部</button>
        <button class="filter" data-filter="chat">对话</button>
        <button class="filter" data-filter="vision">视觉</button>
        <button class="filter" data-filter="audio">语音</button>
        <button class="filter" data-filter="code">代码</button>
        <button class="filter" data-filter="agent">Agent</button>
      </div>
    </div>
  </header>

  <main class="container">
    <section class="intro">
      <h2>如何使用</h2>
      <p>在上方搜索框输入关键词（例如“多模态”、“OpenAI”、“Claude”、“本地部署”），或点击功能标签进行筛选。</p>
    </section>

    <section id="cards" class="cards"></section>
  </main>

  <footer class="footer">
    <div class="footer-inner">
      <p>本页面为静态示例，可在 <code>script.js</code> 中编辑数据源。</p>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
